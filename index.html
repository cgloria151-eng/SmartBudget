<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBudget</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand">SmartBudget</span>
  </nav>
</header>

<main class="container mt-5">

  <section class="hero text-center">
    <h1 class="hero__title">Controla tus finanzas</h1>
    <p class="hero__text">Administra tu dinero fácilmente</p>
    <button class="btn btn-primary">Comenzar</button>
  </section>

  <section class="row mt-5">

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card__title">Ingresos</h5>
          <p class="card__text">Registra ingresos</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card__title">Gastos</h5>
          <p class="card__text">Controla gastos</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card__title">Balance</h5>
          <p class="card__text">Consulta tu balance</p>
        </div>
      </div>
    </div>

  </section>

</main>

<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 SmartBudget</p>
</footer>

</body>
</html>
